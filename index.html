<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Bomb 3D - Eventos Especiais Sincronizados</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .card { background: #34495e; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #3498db; }
        
        /* Textos na Tela */
        #timer-text { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 50px; font-weight: bold; pointer-events: none; z-index: 10; text-shadow: 3px 3px 0 #000; color: #f1c40f; }
        #evento-text { position: absolute; top: 70px; width: 100%; text-align: center; font-size: 25px; font-weight: bold; pointer-events: none; z-index: 10; text-shadow: 2px 2px 0 #000; color: #ff9f43; }
        
        button { background: #3498db; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        input { padding: 10px; margin-bottom: 10px; width: 200px; display: block; border-radius: 5px; border: none; }
        #btn-iniciar { position: absolute; top: 20px; left: 20px; z-index: 100; display: none; background: #e74c3c; }
        
        /* Controles Mobile */
        #mobile-controls { position: fixed; bottom: 20px; left: 20px; z-index: 100; display: grid; grid-template-columns: 60px 60px 60px; gap: 5px; }
        .btn-dir { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; user-select: none; }

        /* Sistema de Chat */
        #chat-container { position: fixed; bottom: 20px; right: 20px; width: 260px; height: 200px; background: rgba(44, 62, 80, 0.85); border: 2px solid #3498db; border-radius: 10px; display: none; flex-direction: column; padding: 10px; z-index: 100; box-sizing: border-box; }
        #chat-messages { flex: 1; overflow-y: auto; font-size: 14px; margin-bottom: 5px; display: flex; flex-direction: column; gap: 4px; text-align: left; }
        #chat-messages div { word-break: break-all; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 5px; }
        #chat-input { width: 100%; padding: 8px; border-radius: 5px; border: none; box-sizing: border-box; outline: none; background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen">
        <div class="card">
            <h1>ARENA BOMB 3D</h1>
            <input id="nick" placeholder="Seu apelido">
            <div id="list"></div>
            <button onclick="criarSala()">CRIAR SALA</button>
        </div>
    </div>

    <button id="btn-iniciar" onclick="iniciarJogoDono()">INICIAR JOGO</button>
    <div id="timer-text">Aguardando...</div>
    <div id="evento-text"></div>
    <div id="canvas-container"></div>

    <div id="mobile-controls">
        <div></div><div class="btn-dir" onpointerdown="mover('w')">▲</div><div></div>
        <div class="btn-dir" onpointerdown="mover('a')">◀</div><div class="btn-dir" onpointerdown="mover('s')">▼</div><div class="btn-dir" onpointerdown="mover('d')">▶</div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input id="chat-input" placeholder="Digite e aperte Enter..." onkeydown="if(event.key === 'Enter') enviarMensagem()">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://servidor-5e967-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const loader = new THREE.TextureLoader();
        
        let roomId, myId, myPlayer, bomba, boomSprite, scene, camera, renderer;
        let otherPlayers = {}; 
        let gameStarted = false;
        let timerInterval = null;
        
        // Variáveis de controle de Estado da Sala
        let currentStatus = 'waiting';
        let currentBombHolder = 'none';
        let currentEvento = 'NORMAL';
        let canPassBomb = true;

        function mover(direcao) {
            if(!myPlayer) return;
            if(direcao === 'w') myPlayer.position.z -= 0.5;
            if(direcao === 's') myPlayer.position.z += 0.5;
            if(direcao === 'a') myPlayer.position.x -= 0.5;
            if(direcao === 'd') myPlayer.position.x += 0.5;
            
            db.ref(`rooms/${roomId}/players/${myId}`).update({
                x: myPlayer.position.x, 
                z: myPlayer.position.z
            });
        }

        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if(!texto) return;
            
            const meuNick = document.getElementById('nick').value || 'Jogador';
            db.ref(`rooms/${roomId}/chat`).push({ nick: meuNick, text: texto });
            input.value = '';
        }

        db.ref('rooms').on('value', snap => {
            const list = document.getElementById('list');
            list.innerHTML = '<h3>Salas Disponíveis:</h3>';
            if (!snap.exists()) { list.innerHTML += "<p>Nenhuma sala no momento.</p>"; return; }
            snap.forEach(s => {
                const btn = document.createElement('button');
                btn.innerText = `Entrar em ${s.key}`;
                btn.onclick = () => entrarNaSala(s.key);
                list.appendChild(btn);
            });
        });

        function criarSala() {
            // 1. Gera o seu ID ANTES de criar a sala
            myId = 'p_' + Math.floor(Math.random() * 1000); 
            
            const salaId = 'Sala_' + Math.floor(Math.random() * 1000);
            const meuNick = document.getElementById('nick').value || 'Anônimo';
            
            db.ref('rooms/' + salaId).set({ 
                status: 'waiting', 
                criador: meuNick, 
                hostId: myId, // Agora o Firebase salva que VOCÊ é o dono
                bombHolder: 'none', 
                eventoAtual: 'NORMAL' 
            }).then(() => {
                entrarNaSala(salaId);
            });
        }

        function entrarNaSala(id) {
            roomId = id;
            
            // 2. Só cria um ID novo se for um amigo entrando na sua sala (visitante)
            if (!myId) {
                myId = 'p_' + Math.floor(Math.random() * 1000);
            }
            
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            
            iniciar3D();
            monitorarPartida();
            
            db.ref(`rooms/${roomId}/chat`).on('child_added', snap => {
                const data = snap.val();
                if (data) {
                    const msgDiv = document.createElement('div');
                    msgDiv.innerHTML = `<strong>${data.nick}:</strong> ${data.text}`;
                    const box = document.getElementById('chat-messages');
                    box.appendChild(msgDiv);
                    box.scrollTop = box.scrollHeight; 
                }
            });

            const myPlayerRef = db.ref(`rooms/${roomId}/players/${myId}`);
            myPlayerRef.set({ nick: document.getElementById('nick').value || 'Jogador', x: 0, z: 0 });
            myPlayerRef.onDisconnect().remove();

            db.ref(`rooms/${roomId}/players`).on('value', snap => {
                const data = snap.val() || {};
                Object.keys(data).forEach(pid => {
                    if (pid !== myId) {
                        if (!otherPlayers[pid]) {
                            otherPlayers[pid] = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.8), new THREE.MeshLambertMaterial({color: 0x0000ff}));
                            scene.add(otherPlayers[pid]);
                        }
                        otherPlayers[pid].position.set(data[pid].x, 0.5, data[pid].z);
                    }
                });
                Object.keys(otherPlayers).forEach(pid => { if (!data[pid]) { scene.remove(otherPlayers[pid]); delete otherPlayers[pid]; } });
            });
        }

        function iniciarJogoDono() {
            db.ref(`rooms/${roomId}/players`).once('value', snap => {
                const playersList = Object.keys(snap.val() || {});
                if(playersList.length === 0) return;
                const jogadorSorteado = playersList[Math.floor(Math.random() * playersList.length)];
                
                db.ref('rooms/' + roomId).update({ 
                    status: 'started', 
                    bombHolder: jogadorSorteado,
                    eventoAtual: 'NORMAL' 
                });
            });
        }

        // ========================================================
        // MONITOR DE SALA UNIFICADO (FIM DE RACE CONDITIONS)
        // ========================================================
        function monitorarPartida() {
            db.ref(`rooms/${roomId}`).on('value', snap => {
                const roomData = snap.val();
                if (!roomData) return;

                const novoStatus = roomData.status || 'waiting';
                const novoDono = roomData.bombHolder || 'none';
                const novoEvento = roomData.eventoAtual || 'NORMAL';

                // 1. Controle de Status (Início e Fim)
                if (novoStatus === 'started' && currentStatus !== 'started') {
                    gameStarted = true;
                    document.getElementById('btn-iniciar').style.display = 'none';
                    iniciarContagem(); // Dispara o 3, 2, 1
                } 
                if (novoStatus === 'waiting') {
                    gameStarted = false;
                    if (roomData.hostId === myId) {
                        document.getElementById('btn-iniciar').style.display = 'block';
                    } else {
                        document.getElementById('btn-iniciar').style.display = 'none';
                    }
                }

                // 2. Controle Visual dos Eventos Especiais
                if (novoEvento !== currentEvento || novoStatus === 'waiting') {
                    aplicarEfeitosEvento(novoEvento);
                }

                // 3. REINICIAR O TIMER QUANDO A BOMBA PASSA PARA OUTRO JOGADOR
                if (novoStatus === 'started' && novoDono !== 'none' && novoDono !== currentBombHolder) {
                    canPassBomb = false;
                    setTimeout(() => { canPassBomb = true; }, 1000); // Cooldown de 1 segundo de segurança

                    // Só reinicia o timer se não for a primeira distribuição (evita bugar o countdown inicial)
                    if (currentBombHolder !== 'none' && currentBombHolder !== null) {
                        let tempoSorteado = 15;
                        if (novoEvento === 'PÂNICO') tempoSorteado = 5;
                        iniciarTimerBomba(tempoSorteado); // Reseta o relógio local perfeitamente!
                    }
                }

                // Atualiza as variáveis de rastreamento local
                currentStatus = novoStatus;
                currentBombHolder = novoDono;
                currentEvento = novoEvento;
            });
        }

        function aplicarEfeitosEvento(evento) {
            const eventoEl = document.getElementById('evento-text');
            if (bomba) {
                bomba.scale.set(1, 1, 1);
                bomba.material.transparent = false;
                bomba.material.opacity = 1;
            }

            if (evento === 'NORMAL') {
                eventoEl.innerText = "";
            } else if (evento === 'BOMBA GIGANTE') {
                eventoEl.innerText = "BOMBA GIGANTE!";
                eventoEl.style.color = "#e74c3c";
                if (bomba) bomba.scale.set(3, 3, 3);
            } else if (evento === 'PÂNICO') {
                eventoEl.innerText = "PÂNICO! (5 Segundos)";
                eventoEl.style.color = "#9b59b6";
            } else if (evento === 'BOMBA FANTASMA') {
                eventoEl.innerText = "BOMBA FANTASMA!";
                eventoEl.style.color = "#bdc3c7";
                if (bomba) {
                    bomba.material.transparent = true;
                    bomba.material.opacity = 0.2;
                }
            }
        }

        function verificarColisaoBomba() {
            if (currentBombHolder !== myId || !canPassBomb) return;
            Object.keys(otherPlayers).forEach(pid => {
                const distancia = myPlayer.position.distanceTo(otherPlayers[pid].position);
                if (distancia < 1.2) passarBombaPara(pid);
            });
        }

        function passarBombaPara(novoDonoId) {
            canPassBomb = false; 
            const eventos = ['NORMAL', 'NORMAL', 'BOMBA GIGANTE', 'PÂNICO', 'BOMBA FANTASMA'];
            const eventoSorteado = eventos[Math.floor(Math.random() * eventos.length)];
            
            db.ref(`rooms/${roomId}`).update({
                bombHolder: novoDonoId,
                eventoAtual: eventoSorteado
            });
        }

        // --- SISTEMA DE CRONÔMETROS DO JOGO ---
        function iniciarContagem() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('evento-text').innerText = "";
            document.getElementById('timer-text').style.color = "#f1c40f";

            let count = 3;
            let timerEl = document.getElementById('timer-text');
            timerInterval = setInterval(() => {
                timerEl.innerText = count > 0 ? count : "JÁ!";
                if(count <= 0) { 
                    clearInterval(timerInterval); 
                    iniciarTimerBomba(15); 
                }
                count--;
            }, 1000);
        }

        function iniciarTimerBomba(segundos) {
            if (timerInterval) clearInterval(timerInterval); // Para o relógio anterior antes de criar o novo!

            let t = segundos;
            let timerEl = document.getElementById('timer-text');
            timerEl.style.color = "#f1c40f";
            timerInterval = setInterval(() => {
                timerEl.innerText = "BOMBA: " + t;
                if(t <= 0) { 
                    clearInterval(timerInterval); 
                    explodir(); 
                }
                t--;
            }, 1000);
        }

        function explodir() {
            if(boomSprite) {
                if(bomba) bomba.visible = false; 
                boomSprite.visible = true;
                
                if (currentBombHolder === myId) {
                    document.getElementById('timer-text').innerText = "VOCÊ EXPLODIU!";
                    document.getElementById('timer-text').style.color = "#e74c3c";
                } else {
                    document.getElementById('timer-text').innerText = "ALGUÉM EXPLODIU!";
                }

                // SÓ QUEM EXPLODIU atualiza o Firebase! Evita que múltiplos players reiniciem a sala ao mesmo tempo e quebrem o código.
                if (currentBombHolder === myId) {
                    setTimeout(() => { 
                        db.ref('rooms/' + roomId).update({
                            status: 'waiting',
                            bombHolder: 'none',
                            eventoAtual: 'NORMAL'
                        });
                    }, 3000);
                }

                setTimeout(() => {
                    if(bomba) bomba.visible = true; 
                    boomSprite.visible = false; 
                    document.getElementById('timer-text').innerText = "FIM DE JOGO";
                    document.getElementById('timer-text').style.color = "#f1c40f";
                    document.getElementById('evento-text').innerText = "";
                }, 3000);
                    }
                }

        function iniciar3D() {
            scene = new THREE.Scene();
            scene.background = loader.load('cenario.png');
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const matTop = new THREE.MeshLambertMaterial({map: loader.load('topo da grama.png')});
            const matSide = new THREE.MeshLambertMaterial({map: loader.load('lados da grama.png')});
            const materials = [matSide, matSide, matTop, matSide, matSide, matSide];
            for(let x = -16; x < 16; x++) {
                for(let z = -16; z < 16; z++) {
                    let floor = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), materials);
                    floor.position.set(x, -0.5, z);
                    scene.add(floor);
                }
            }
            myPlayer = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.8), new THREE.MeshLambertMaterial({color: 0x00ff00})); 
            myPlayer.position.y = 0.5;
            scene.add(myPlayer);
            
            const bombaMaterial = new THREE.MeshBasicMaterial({color: 0xff0000});
            bomba = new THREE.Mesh(new THREE.SphereGeometry(0.4), bombaMaterial);
            bomba.visible = false;
            scene.add(bomba);
            
            const boomMat = new THREE.SpriteMaterial({ map: loader.load('boom.png'), color: 0xffffff, depthTest: false });
            boomSprite = new THREE.Sprite(boomMat);
            boomSprite.scale.set(12, 12, 1); 
            boomSprite.renderOrder = 999; 
            boomSprite.visible = false;
            scene.add(boomSprite);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(myPlayer) {
                camera.position.set(myPlayer.position.x, 8, myPlayer.position.z + 10);
                camera.lookAt(myPlayer.position);
                if (gameStarted && currentBombHolder !== 'none') {
                    bomba.visible = true;
                    let holderMesh = null;
                    if (currentBombHolder === myId) {
                        holderMesh = myPlayer;
                        verificarColisaoBomba();
                    } else if (otherPlayers[currentBombHolder]) {
                        holderMesh = otherPlayers[currentBombHolder];
                    }
                    if (holderMesh) {
                        bomba.position.set(holderMesh.position.x, 2, holderMesh.position.z);
                        boomSprite.position.set(holderMesh.position.x, 3, holderMesh.position.z);
                    }
                } else { bomba.visible = false; }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('keydown', (e) => {
            if(!myPlayer) return;
            if(e.key === 'w') mover('w');
            if(e.key === 's') mover('s');
            if(e.key === 'a') mover('a');
            if(e.key === 'd') mover('d');
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
